<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Distribución por Duración</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 30px;
        }
        .chart-container {
            width: 90%;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="chart-container">
    <canvas id="duracionChart"></canvas>
</div>

<script>
    const ctx = document.getElementById('duracionChart').getContext('2d');

    const valores = [753, 490, 733, 1017, 306];
    const total = valores.reduce((a, b) => a + b, 0);

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Buzón', 'Muy Corta', 'Corta', 'Media', 'Larga'],
            datasets: [{
                label: 'Cantidad de llamadas',
                data: valores,
                backgroundColor: [
                    '#f17c4a',
                    '#ff5c7a',
                    '#ff4f81',
                    '#e83e8c',
                    '#8e44ad'
                ],
                borderRadius: 8
            }]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: {
                        font: {
                            size: 11
                        }
                    }
                },
                title: {
                    display: true,
                    text: 'Distribución por Duración',
                    font: {
                        size: 14
                    }
                },
                datalabels: {
                    color: '#ffffff',
                    anchor: 'center',
                    align: 'center',
                    font: {
                        size: 10,
                        weight: 'bold'
                    },
                    formatter: function(value) {
                        const percentage = ((value / total) * 100).toFixed(1);
                        return value.toLocaleString() + ' (' + percentage + '%)';
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        font: {
                            size: 10
                        }
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        font: {
                            size: 10
                        }
                    }
                }
            }
        }
    });
</script>

</body>
</html>
